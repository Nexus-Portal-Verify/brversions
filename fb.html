<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Version Filter Tool (Chrome Engine Based)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f3f7;
            color: #3a4750;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #f0f3f7;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 12px 12px 24px #d1d9e6, -12px -12px 24px #ffffff;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #2c3e50;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: #7f8c8d;
        }

        .filter-section {
            background: #ebf0f6;
            padding: 20px;
            border-radius: 20px;
            box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
            margin-bottom: 30px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .btn-3d {
            background: #f0f3f7;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 600;
            color: #4a5568;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 5px 5px 10px #cfd7e3, -5px -5px 10px #ffffff;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-3d:hover {
            color: #1a202c;
            transform: translateY(-2px);
            box-shadow: 7px 7px 14px #c2cbdc, -7px -7px 14px #ffffff;
        }

        .btn-3d:active, .btn-3d.active {
            transform: translateY(1px);
            box-shadow: inset 3px 3px 6px #cfd7e3, inset -3px -3px 6px #ffffff;
            color: #2b6cb0;
            background: #e6fffa;
            border-color: rgba(43, 108, 176, 0.2);
        }

        .results-section {
            min-height: 200px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4a5568;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .version-count {
            font-size: 12px;
            background: #2b6cb0;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .version-card {
            background: #f0f3f7;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff;
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden;
        }

        .version-card:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px #c2cbdc, -6px -6px 12px #ffffff;
            background: #ffffff;
            color: #2b6cb0;
        }

        .version-card:active {
            transform: translateY(0);
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        .version-card.copied-flash {
            background: #cef7e4 !important;
            border-color: #a3e2c1 !important;
            color: #1c7447 !important;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            background: #2d3748;
            color: #ffffff;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Facebook Version Engine</h1>
            <p>Select a Chrome version to view and copy corresponding Facebook builds</p>
        </header>

        <div class="filter-section">
            <div class="button-grid" id="buttonGrid"></div>
        </div>

        <div class="results-section">
            <div class="section-title">
                <span id="currentSelectionTitle">Select a Chrome Version</span>
                <span class="version-count" id="versionCount" style="display: none;">0 Items</span>
            </div>
            <div class="version-grid" id="versionGrid">
                <div class="empty-state"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastNotification">Version copied to clipboard!</div>

    <script>
        // ඔයා දීපු JSON data එක Chrome major versions වලට map කරලා තියෙන්නේ මෙතනින්
        const facebookVersionsData = {
            "126": ["541.0.0.85.79"],
            "127": ["542.0.0.46.151"],
            "128": ["543.0.0.32.73", "543.0.0.55.73", "543.0.0.56.73", "543.0.0.58.73"],
            "129": ["544.0.0.0.52", "544.0.0.0.61", "544.0.0.0.115", "544.0.0.0.144", "544.0.0.0.191", "544.0.0.0.213", "544.0.0.37.272", "544.0.0.42.272"],
            "130": ["545.0.0.0.0", "545.0.0.23.63", "545.0.0.37.63", "545.0.0.43.63"],
            "131": ["546.0.0.0.3", "546.0.0.0.54", "546.0.0.42.66"],
            "132": ["547.0.0.0.12", "547.0.0.24.68", "547.0.0.41.68"],
            "133": ["548.0.0.0.51", "548.1.0.51.64"],
            "134": ["549.0.0.0.2", "549.0.0.21.62", "549.0.0.61.62"],
            "135": ["550.0.0.12.60", "550.0.0.40.60"],
            "136": ["551.0.0.6.63", "551.0.0.56.63"],
            "137": ["552.0.0.0.2", "552.0.0.0.21", "552.0.0.31.68"],
            "138": ["553.0.0.0.5"],
            "139": ["554.0.0.0.14"]
        };

        const buttonGrid = document.getElementById('buttonGrid');
        const versionGrid = document.getElementById('versionGrid');
        const currentSelectionTitle = document.getElementById('currentSelectionTitle');
        const versionCount = document.getElementById('versionCount');
        const toast = document.getElementById('toastNotification');

        // ලොකුම Chrome version එකේ ඉඳන් පොඩි එකට (DESC) buttons හදනවා
        const sortedMajors = Object.keys(facebookVersionsData).sort((a, b) => b - a);
        
        sortedMajors.forEach(major => {
            const btn = document.createElement('button');
            btn.className = 'btn-3d';
            btn.textContent = `v${major}`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-3d').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                displayVersions(major);
            });
            buttonGrid.appendChild(btn);
        });

        function displayVersions(majorKey) {
            versionGrid.innerHTML = '';
            const list = facebookVersionsData[majorKey] || [];
            
            currentSelectionTitle.textContent = `Facebook Versions for Chrome v${majorKey}`;
            versionCount.textContent = `${list.length} Builds`;
            versionCount.style.display = 'inline-block';

            if(list.length === 0) {
                versionGrid.innerHTML = '<div class="empty-state">No Facebook versions found for this release.</div>';
                return;
            }

            list.forEach(versionStr => {
                const card = document.createElement('div');
                card.className = 'version-card';
                card.textContent = versionStr;
                
                card.addEventListener('click', () => {
                    navigator.clipboard.writeText(versionStr).then(() => {
                        showToast(`Copied: ${versionStr}`);
                        card.classList.add('copied-flash');
                        setTimeout(() => card.classList.remove('copied-flash'), 400);
                    }).catch(err => {
                        console.error('Could not copy text: ', err);
                    });
                });

                versionGrid.appendChild(card);
            });
        }

        let toastTimeout;
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
